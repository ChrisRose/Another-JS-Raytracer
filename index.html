<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Raytracer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08080f;
      --surface:   #0e0e1a;
      --border:    #1a1a2a;
      --border-hi: #4f6ef7;
      --text:      #d8d8e8;
      --muted:     #5a5a70;
      --accent:    #7c9bff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Gallery ─────────────────────────────────────────── */
    .gallery {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ─── Hero / header with prism ───────────────────────── */
    .gallery-header {
      position: relative;
      overflow: hidden;
      padding: 64px 0 56px;
      margin-bottom: 8px;
    }

    .gallery-header-text { position: relative; z-index: 2; }

    .gallery-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      background: linear-gradient(130deg, #e0e8ff 0%, #a0b8ff 60%, #7c9bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .gallery-header p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 380px;
    }

    /* ─── Prism SVG illustration ──────────────────────────── */
    .prism-wrap {
      position: absolute;
      top: 50%;
      right: -20px;
      transform: translateY(-50%);
      width: 520px;
      height: 300px;
      pointer-events: none;
      opacity: 0.75;
    }

    /* Ray glow animation */
    @keyframes rayPulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.95; }
    }
    @keyframes beamShimmer {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 0.9; }
    }

    .ray-group { animation: rayPulse 3.5s ease-in-out infinite; }
    .beam      { animation: beamShimmer 3.5s ease-in-out infinite; animation-delay: -1.75s; }

    /* ─── Scene grid ──────────────────────────────────────── */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    .scene-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .scene-card:hover {
      border-color: #3d5ce0;
      box-shadow: 0 0 0 1px #4f6ef714, 0 16px 40px #00000070;
      transform: translateY(-2px);
    }

    .scene-thumb {
      width: 100%;
      aspect-ratio: 1;
      background: #06060e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #1a1a28;
      overflow: hidden;
    }
    .scene-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .scene-info { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
    .scene-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: #7c9bff0f;
      border: 1px solid #7c9bff22;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
      width: fit-content;
    }
    .scene-info h2 {
      font-size: 0.97rem;
      font-weight: 600;
      margin-bottom: 7px;
      letter-spacing: -0.01em;
      color: #c8cce8;
    }
    .scene-info p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
      margin-bottom: 16px;
    }
    .render-link {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ─── Renderer page ───────────────────────────────────── */
    .renderer-page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .renderer-nav {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .back-link:hover { color: #ccc; border-color: #333; }
    .renderer-nav h1 { font-size: 1.2rem; font-weight: 600; flex: 1; color: #c8cce8; }
    .render-status { font-size: 0.82rem; color: var(--accent); white-space: nowrap; }

    .canvas-wrap { position: relative; display: inline-block; }
    .canvas-placeholder {
      width: 600px;
      height: 600px;
      background: #05050c;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .canvas-placeholder p { font-size: 0.8rem; color: #333; }

    #render-canvas {
      display: none;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    #image-canvas { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <canvas id="image-canvas" width="1000" height="1000"></canvas>
  <canvas id="render-canvas" width="400" height="400"></canvas>

  <!-- Inline SVG prism — injected into gallery header by index.ts -->
  <template id="prism-svg">
    <svg class="prism-wrap" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Glow filter for rays -->
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Softer glow for the beam -->
        <filter id="beamGlow" x="-20%" y="-60%" width="140%" height="220%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Prism glass gradient -->
        <linearGradient id="prismFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.04"/>
          <stop offset="50%"  stop-color="#aabfff" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
        </linearGradient>
        <!-- Beam gradient: white fading at tip -->
        <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="white" stop-opacity="0"/>
          <stop offset="40%"  stop-color="white" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="white" stop-opacity="0.8"/>
        </linearGradient>
        <!-- Clipping mask so rays stay to the right of prism -->
        <clipPath id="rightClip">
          <rect x="290" y="0" width="230" height="300"/>
        </clipPath>
      </defs>

      <!-- ── Incoming white beam ── -->
      <!-- Wide slightly blurred glow -->
      <rect class="beam" x="0" y="131" width="252" height="18"
            fill="url(#beamGrad)" filter="url(#beamGlow)" rx="2"/>
      <!-- Sharp core -->
      <rect class="beam" x="0" y="138" width="252" height="4"
            fill="white" opacity="0.7" filter="url(#beamGlow)"/>

      <!-- ── Prism body ── -->
      <!-- Glass fill -->
      <polygon points="250,20 110,270 390,270"
               fill="url(#prismFill)"/>
      <!-- Edge highlights: left face -->
      <line x1="250" y1="20" x2="110" y2="270"
            stroke="rgba(200,215,255,0.35)" stroke-width="1.2"/>
      <!-- Edge highlights: right face -->
      <line x1="250" y1="20" x2="390" y2="270"
            stroke="rgba(200,215,255,0.18)" stroke-width="1"/>
      <!-- Edge highlights: base -->
      <line x1="110" y1="270" x2="390" y2="270"
            stroke="rgba(200,215,255,0.12)" stroke-width="1"/>
      <!-- Subtle internal reflection line -->
      <line x1="200" y1="140" x2="310" y2="200"
            stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

      <!-- ── Dispersed rays (exit from right face ~x=310, y=200) ── -->
      <g class="ray-group" clip-path="url(#rightClip)">
        <!-- Each ray: thick blurred + thin sharp core -->
        <!-- Red -->
        <line x1="305" y1="196" x2="520" y2="115"
              stroke="#ff3c3c" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="305" y1="196" x2="520" y2="115"
              stroke="#ff6060" stroke-width="1.5" opacity="0.9"/>
        <!-- Orange -->
        <line x1="307" y1="199" x2="520" y2="148"
              stroke="#ff7a2a" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="307" y1="199" x2="520" y2="148"
              stroke="#ffa050" stroke-width="1.5" opacity="0.9"/>
        <!-- Yellow -->
        <line x1="309" y1="202" x2="520" y2="183"
              stroke="#ffe000" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="309" y1="202" x2="520" y2="183"
              stroke="#ffe840" stroke-width="1.5" opacity="0.9"/>
        <!-- Green -->
        <line x1="311" y1="206" x2="520" y2="220"
              stroke="#30d060" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="311" y1="206" x2="520" y2="220"
              stroke="#50e880" stroke-width="1.5" opacity="0.9"/>
        <!-- Cyan -->
        <line x1="313" y1="210" x2="520" y2="258"
              stroke="#10c8d8" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="313" y1="210" x2="520" y2="258"
              stroke="#40d8e8" stroke-width="1.5" opacity="0.9"/>
        <!-- Blue -->
        <line x1="315" y1="214" x2="520" y2="296"
              stroke="#4488ff" stroke-width="5" opacity="0.35" filter="url(#glow)"/>
        <line x1="315" y1="214" x2="520" y2="296"
              stroke="#70a8ff" stroke-width="1.5" opacity="0.9"/>
        <!-- Violet -->
        <line x1="317" y1="218" x2="520" y2="300"
              stroke="#a040ff" stroke-width="5" opacity="0.3" filter="url(#glow)"/>
        <line x1="317" y1="218" x2="520" y2="300"
              stroke="#c070ff" stroke-width="1.5" opacity="0.85"/>

        <!-- Rainbow fill between rays (subtle gradient band) -->
        <polygon
          points="305,196 520,115 520,300 317,218"
          fill="none"
          stroke="none"
          opacity="0.08">
          <animate attributeName="opacity" values="0.06;0.12;0.06" dur="3.5s" repeatCount="indefinite"/>
        </polygon>
      </g>

      <!-- Tiny sparkle where beam enters prism -->
      <circle cx="214" cy="140" r="3" fill="white" opacity="0.5" filter="url(#glow)"/>
      <!-- Tiny sparkle at dispersion exit -->
      <circle cx="310" cy="205" r="2.5" fill="white" opacity="0.4" filter="url(#glow)"/>
    </svg>
  </template>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
